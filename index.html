<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduSpace – Learning Universe</title>
    <meta name="description"
        content="EduSpace main dashboard – an interactive solar system connecting you to your learning universe." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@200;300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <!-- Smooth transition overlay -->
    <div class="transition-overlay" id="transition-overlay"></div>

    <!-- Interactive Space Layer -->
    <div id="space-viewport">

        <!-- Background Canvas layers for depth -->
        <canvas id="starfield" class="parallax-bg"></canvas>
        <canvas id="cosmic-dust" class="parallax-fg"></canvas>

        <!-- Deep Ambient Glows -->
        <div class="ambient-glow glow-blue"></div>
        <div class="ambient-glow glow-purple"></div>

        <!-- The Solar System Group -->
        <div class="solar-system" id="solar-system">

            <!-- Central Sun (Main Dashboard) - Not clickable -->
            <div class="planet-group group-sun" style="transform: translate(0, 0);">
                <div class="planet sun"></div>
                <div class="planet-halo halo-sun"></div>
                <div class="planet-title">
                    <h2>Central AI</h2>
                    <p>Dashboard</p>
                </div>
            </div>

            <!-- Earth (Certificate Vault) -->
            <a href="galaxy-vault.html" class="planet-group group-earth" style="transform: translate(-350px, -180px);">
                <div class="planet earth">
                    <div class="atmosphere"></div>
                </div>
                <div class="planet-halo halo-earth"></div>
                <div class="planet-title">
                    <h2>Certificate Vault</h2>
                    <p>Achievements</p>
                </div>
            </a>

            <!-- Saturn (Learning Playlist) -->
            <a href="orbit-playlist.html" class="planet-group group-saturn"
                style="transform: translate(400px, -220px);">
                <div class="planet saturn">
                    <div class="saturn-rings"></div>
                    <div class="atmosphere"></div>
                </div>
                <div class="planet-halo halo-saturn"></div>
                <div class="planet-title">
                    <h2>Learning Playlist</h2>
                    <p>Video Curator</p>
                </div>
            </a>

            <!-- Mars (Code Zone) -->
            <a href="code-station.html" class="planet-group group-mars" style="transform: translate(250px, 300px);">
                <div class="planet mars"></div>
                <div class="planet-halo halo-mars"></div>
                <div class="planet-title">
                    <h2>Code Zone</h2>
                    <p>Dev Station</p>
                </div>
            </a>

            <!-- Moon (Share Hub) -->
            <a href="share-hub.html" class="planet-group group-moon" style="transform: translate(-280px, 280px);">
                <div class="planet moon"></div>
                <div class="planet-halo halo-moon"></div>
                <div class="planet-title">
                    <h2>Share Hub</h2>
                    <p>Communication Panel</p>
                </div>
            </a>

        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
