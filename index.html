<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduSpace - A modern space-themed education platform for students to manage learning resources">
    <title>EduSpace</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Persistent Star Background -->
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>
    <div class="nebula-bg"></div>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <nav class="sidebar glass-panel">
            <div class="logo">
                <i class="fa-solid fa-user-astronaut nav-icon glowing-icon"></i>
                <h1>EduSpace</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#home" class="nav-link active" data-route="home"><i class="fa-solid fa-house"></i> Universe Dashboard</a></li>
                <li><a href="#vault" class="nav-link" data-route="vault"><i class="fa-solid fa-medal"></i> Galaxy Vault</a></li>
                <li><a href="#playlist" class="nav-link" data-route="playlist"><i class="fa-brands fa-youtube"></i> Orbit Playlist</a></li>
                <li><a href="#code" class="nav-link" data-route="code"><i class="fa-solid fa-terminal"></i> Code Station</a></li>
                <li><a href="#share" class="nav-link" data-route="share"><i class="fa-solid fa-share-nodes"></i> Share Hub</a></li>
                <li><a href="#about" class="nav-link" data-route="about"><i class="fa-solid fa-satellite"></i> About Mission</a></li>
            </ul>
            <div class="student-profile">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div class="info">
                    <span class="name">Cadet Explorer</span>
                    <span class="level">Level 42</span>
                </div>
            </div>
        </nav>

        <!-- Main Content Area where SPA views will be injected -->
        <main id="app-container" class="main-content">
            <!-- View content will be injected here by app.js -->
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
